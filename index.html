<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miguel Cayetano | Portfolio</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#3B82F6', 
                        dark: '#0f172a',
                        darkCard: '#1e293b',
                        light: '#f8fafc',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.8s ease-out forwards',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #3B82F6, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-pill {
            @apply px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded text-sm font-medium hover:bg-primary hover:text-white transition-colors cursor-default;
        }
        .social-icon {
            @apply text-2xl text-gray-400 transition-colors transform hover:scale-110;
        }
    </style>
</head>
<body class="bg-light text-slate-800 dark:bg-dark dark:text-slate-200 transition-colors duration-300">

            <div class="flex justify-between items-center h-16">
                <a href="#" class="text-xl font-bold tracking-tight">MC<span class="text-primary">.</span></a>

                    <a href="#projects" class="hover:text-primary transition-colors">Projects</a>
                    <a href="#skills" class="hover:text-primary transition-colors">Arsenal</a>
                    <a href="#education" class="hover:text-primary transition-colors">Education</a>
                    <a href="#certificates" class="hover:text-primary transition-colors">Certs</a>
                    
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        <i class="fas fa-moon dark:hidden text-gray-600"></i>

        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-darkCard border-t dark:border-gray-700 absolute w-full left-0 shadow-lg">

                <a href="#home" class="mobile-link py-2">Home</a>
                <a href="#projects" class="mobile-link py-2">Projects</a>
                <a href="#skills" class="mobile-link py-2">Skills</a>

                <button id="theme-toggle-mobile" class="py-2 text-primary font-bold">Switch Theme</button>

        </div>
    </nav>

        <div class="max-w-4xl mx-auto text
